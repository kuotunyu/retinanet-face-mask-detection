project:
  name: retinanet-face-mask-detection
  description: RetinaNet face mask detection with VOC-format annotations.

paths:
  classes_path: model_data/mask_classes.txt
  pretrained_model_path: model_data/resnet50_coco_best_v2.1.0.h5
  inference_model_path: logs/ep083-loss0.241-val_loss0.267.h5
  train_annotation_path: 2007_train.txt
  val_annotation_path: 2007_val.txt
  vocdevkit_path: VOCdevkit
  map_out_path: map_out
  log_dir: logs
  font_path: model_data/simhei.ttf

model:
  input_shape: [600, 600]
  anchors_size: [32, 64, 128, 256, 512]
  confidence: 0.5
  nms_iou: 0.3
  letterbox_image: false

training:
  init_epoch: 0
  freeze_epoch: 50
  unfreeze_epoch: 100
  freeze_batch_size: 16
  unfreeze_batch_size: 4
  freeze_lr: 0.0001
  unfreeze_lr: 0.00001
  freeze_train: true
  num_workers: 1
  seed: 0
  lr_decay_rate: 0.96
  early_stopping_patience: 10
  save_best_only: true

annotation:
  mode: 0
  trainval_percent: 0.8
  train_percent: 0.8
  voc_year: "2007"

evaluation:
  map_mode: 0
  min_overlap: 0.5
  map_vis: false
  confidence: 0.01
  nms_iou: 0.5
